name: Release

# Push a tag like `v0.1.0-beta.1` to cut a release. Tags containing a hyphen
# (a semver pre-release identifier) are published as GitHub pre-releases, which
# HACS hides unless the user enables "Show beta versions".
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/climate-comfort-card.js
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
